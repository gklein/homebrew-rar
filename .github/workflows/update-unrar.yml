name: Check for unrar updates

on:
  schedule:
    - cron: "0 8 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  check-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check for new version
        id: check
        run: |
          CURRENT=$(grep -oP 'unrarsrc-\K[0-9]+\.[0-9]+\.[0-9]+' Formula/unrar.rb | head -1)
          echo "current=$CURRENT"

          LATEST=$(curl -fsSL https://www.rarlab.com/rar_add.htm \
            | grep -oP 'href="[^"]*unrarsrc-\K[0-9]+\.[0-9]+\.[0-9]+' \
            | sort -V | tail -1)
          echo "latest=$LATEST"

          if [ -z "$LATEST" ]; then
            echo "Failed to detect latest version"
            exit 1
          fi

          if [ "$CURRENT" = "$LATEST" ]; then
            echo "Already up to date ($CURRENT)"
            echo "up_to_date=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Update available: $CURRENT -> $LATEST"
          echo "up_to_date=false" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"

      - name: Check for existing PR
        if: steps.check.outputs.up_to_date == 'false'
        id: pr_check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=${{ steps.check.outputs.latest }}
          EXISTING=$(gh pr list --search "unrar $LATEST" --state open --json number --jq length)
          if [ "$EXISTING" -gt 0 ]; then
            echo "PR already exists for $LATEST"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update formula and create PR
        if: steps.check.outputs.up_to_date == 'false' && steps.pr_check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST=${{ steps.check.outputs.latest }}

          # Download tarball and compute sha256
          SHA256=$(curl -fsSL "https://www.rarlab.com/rar/unrarsrc-${LATEST}.tar.gz" | sha256sum | awk '{print $1}')
          echo "New sha256: $SHA256"

          # Update formula
          sed -i "s|unrarsrc-[0-9]\+\.[0-9]\+\.[0-9]\+\.tar\.gz|unrarsrc-${LATEST}.tar.gz|" Formula/unrar.rb
          sed -i "s|sha256 \"[a-f0-9]\{64\}\"|sha256 \"${SHA256}\"|" Formula/unrar.rb

          # Verify the changes look correct
          head -6 Formula/unrar.rb

          # Create branch, commit, and PR
          BRANCH="update-unrar-${LATEST}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add Formula/unrar.rb
          git commit -m "Update unrar to ${LATEST}"
          git push origin "$BRANCH"

          gh pr create \
            --title "Update unrar to ${LATEST}" \
            --body "Automated update: unrar ${LATEST} detected from rarlab.com."
